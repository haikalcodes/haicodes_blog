name: Deploy to Northflank

on:
    push:
        branches: ["master"]


jobs:
    build_and_deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest
    
        permissions:
            contents: read
            packages: write
        
        env:
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.repository }}/app

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GHCR_KEY }}
            
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & push image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: docker/production/combined/Dockerfile
                target: production
                push: true
                cache-from: type=registry,ref=${{env.REGISTRY}}/${{env.IMAGE_NAME}}:buildcache
                cache-to: type=registry,ref=${{env.REGISTRY}}/${{env.IMAGE_NAME}}:buildcache,mode=max
                tags: |
                    ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:${{github.sha}}
                    ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:latest
            
            - name: Deploy App to Northflank
              uses: northflank/deploy-to-northflank@v1
              with:
                northflank-api-key: ${{secrets.NORTHFLANK_API_KEY}}
                project-id: ${{secrets.PROJECT_ID}}
                service-id: ${{secrets.APP_SERVICE_ID}}
                image-path: ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:${{github.sha}}
                credentials-id: ${{secrets.NORTHFLANK_CREDENTIALS_ID}}